<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TurboTrade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="login-login">
        <section class="login-container">
            <div class="login-box">
                <h2>Autentificare</h2>
                <p>Introdu datele contului tău</p>

                <form action="#">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="nume@exemplu.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Parolă</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Ai uitat parola?</a>
                    </div>

                    <button type="submit" class="btn-login">Intră în cont</button>

                    <div class="register-link">
                        <span>Nu ai un cont?</span>
                        <a href="#">Înregistrează-te acum</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
