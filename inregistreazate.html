<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="inregistrare.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inregistreazate</title>
</head>
<body class="dark-theme">

    <nav class="navbar">
        <div class="logo"><a href="index.html">TurboTrade</a></div>
        <ul class="navbtn">
            <li><a href="catalog.html">STOC</a></li>
            <li><a href="servicii.html">SERVICII</a></li>
            <li><a href="finantare.html">FINANȚARE</a></li>
            <li><a href="despre-noi.html">DESPRE NOI</a></li>
            
            <li class="login-btn-outline" id="nav-login"><a href="login.html">LOGIN</a></li>
            <li class="login-btn-outline" id="nav-profil" style="display: none;"><a href="profil.html">PROFIL</a></li>
            
        </ul>
    </nav>

    <main class="register-container">
        <form class="register-box">
            
            <div class="input-group">
                <label for="name">Nume</label>
                <input type="text" id="name" placeholder="Numele tau" required>
            </div>

            <div class="input-group">
                <label for="surname">Prenume</label>
                <input type="text" id="surname" placeholder="Prenumele tau" required>
            </div>

            <div class="input-group">
                <label for="phone-number">Numar de telefon</label>
                <input type="text" id="phone-number" placeholder="069120358" required>
            </div>

            <div class="input-group">
                <label for="email">EMAIL</label>
                <input type="text" id="email" placeholder="adresa@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">PAROLĂ</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label for="password-confirm">CONFIRMĂ PAROLA</label>
                <input type="password" id="password-confirm" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="submit-btn">Sign up</button>
            
        </form>
    </main>

    <script src="inregistrare.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
